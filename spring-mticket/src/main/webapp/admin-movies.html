<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Management</title>

    <link href=
    "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Add Movie</h2>

    <form th:action="@{/admin/movies/add}"
          method="post"
          th:object="${movie}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="Movie Title">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{genre}"
                       placeholder="Genre">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{language}"
                       placeholder="Language">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{duration}"
                       placeholder="Duration">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{rating}"
                       placeholder="Rating">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text"
                       class="form-control"
                       th:field="*{poster}"
                       placeholder="/images/posters/movie.jpg">
            </div>

        </div>

        <button class="btn btn-success">
            Add Movie
        </button>

    </form>

    <hr>

    <h2>Movies</h2>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Genre</th>
            <th>Language</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="movie : ${movies}">

            <td th:text="${movie.id}"></td>

            <td th:text="${movie.title}"></td>

            <td th:text="${movie.genre}"></td>

            <td th:text="${movie.language}"></td>

            <td>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/admin/movies/delete/{id}(id=${movie.id})}">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
