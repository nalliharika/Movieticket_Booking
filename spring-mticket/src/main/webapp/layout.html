<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>CineBook</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<!-- TOP NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🎬 CineBook
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/movies">
                       Movies
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/offers">
                       Offers
                    </a>
                </li>

            </ul>

            <form class="d-flex">

                <input class="form-control me-2"
                       placeholder="Search movie">

                <button class="btn btn-danger">
                    Search
                </button>

            </form>

        </div>

    </div>

</nav>


<!-- HERO SECTION -->

<section class="hero-section">

    <div class="container text-center">

        <h1>Book Tickets Instantly</h1>

        <p>
            Latest Movies, Premium Seats,
            Fast Booking Experience
        </p>

        <a href="/movies"
           class="btn btn-danger btn-lg">
            Explore Movies
        </a>

    </div>

</section>


<!-- DYNAMIC CONTENT -->

<div class="container mt-4 mb-5">

    <div th:replace="${content}">
    </div>

</div>


<!-- FOOTER -->

<footer>

    <div class="container">

        <div class="row">

            <div class="col-md-4">
                <h5>CineBook</h5>
                <p>Movie Ticket Booking Portal</p>
            </div>

            <div class="col-md-4">
                <h5>Quick Links</h5>

                <ul>

                    <li>
                        <a href="/">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="/movies">
                            Movies
                        </a>
                    </li>

                </ul>

            </div>

            <div class="col-md-4">
                <h5>Support</h5>

                <p>
                    support@cinebook.com
                </p>

            </div>

        </div>

    </div>

</footer>

<script src="/js/app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
